<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Checkout - Nexus</title>
  <link rel="stylesheet" href="/css/main.css">
  <style>
    .payment-loader { display: none; text-align: center; padding: 40px; }
    .spinner { border: 4px solid var(--border-color); border-top: 4px solid var(--accent-color); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
    <div class="nav-container">
      <a href="/" class="nav-logo">Nexus</a>
      <div class="nav-links" id="nav-links"></div>
    </div>
  </nav>

  <div class="container fade-in">
    <div class="form-container" id="checkout-block">
      <h2>Checkout</h2>
      <p style="text-align:center; margin-bottom:20px; font-weight:600;">Total: ₹<span id="total-display">0.00</span></p>
      <form id="checkout-form">
        <input type="text" id="cardName" placeholder="Cardholder Name" required>
        <input type="text" id="cardNumber" placeholder="Card Number (Fake)" required maxlength="19" pattern="\\d{16}" title="16 digit card number">
        <div style="display:flex; gap:10px;">
          <input type="text" id="expiry" placeholder="MM/YY" required pattern="\\d{2}/\\d{2}">
          <input type="text" id="cvv" placeholder="CVV" required pattern="\\d{3}">
        </div>
        <button type="submit" style="width: 100%; margin-top:20px;">Pay Now</button>
      </form>
    </div>

    <div class="form-container fade-in payment-loader" id="loading-block">
      <div class="spinner"></div>
      <h2>Processing Payment...</h2>
      <p>Please do not refresh the page.</p>
    </div>
    
    <div class="form-container fade-in payment-loader" id="success-block">
      <h2 style="color: var(--success); font-size: 48px; margin-bottom:20px;">✓</h2>
      <h2>Payment Successful!</h2>
      <p>Your order #<span id="order-id-display"></span> has been placed.</p>
      <br>
      <a href="/orders.html" class="button">View Orders</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    if (!localStorage.getItem('token')) window.location.href = '/login.html';
    
    const total = sessionStorage.getItem('checkoutTotal');
    if (!total) window.location.href = '/cart.html';
    
    document.getElementById('total-display').innerText = total;

    document.getElementById('checkout-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const payload = {
        cardNumber: document.getElementById('cardNumber').value,
        cardName: document.getElementById('cardName').value,
        expiry: document.getElementById('expiry').value,
        cvv: document.getElementById('cvv').value,
        totalPrice: total
      };

      document.getElementById('checkout-block').style.display = 'none';
      document.getElementById('loading-block').style.display = 'block';

      try {
        const res = await window.api.checkout(payload);
        
        document.getElementById('loading-block').style.display = 'none';
        document.getElementById('success-block').style.display = 'block';
        document.getElementById('order-id-display').innerText = res.orderId;
        
        sessionStorage.removeItem('checkoutTotal');
      } catch (err) {
        window.showToast(err.message, true);
        document.getElementById('loading-block').style.display = 'none';
        document.getElementById('checkout-block').style.display = 'block';
      }
    });

    document.getElementById('cardNumber').addEventListener('input', function (e) {
      this.value = this.value.replace(/\\D/g, '');
    });
  </script>
</body>
</html>
